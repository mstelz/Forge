<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Top-lit gradient: bright amber top → deep amber bottom -->
    <linearGradient id="anvil" x1="256" y1="138" x2="256" y2="358" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#FCD34D"/>
      <stop offset="40%"  stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#92400E"/>
    </linearGradient>
    <!-- Soft glow behind the anvil -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="18" result="blur"/>
      <feBlend in="SourceGraphic" in2="blur" mode="screen"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="#0B0B0C" rx="88"/>

  <!-- Glow layer -->
  <path
    d="M 170,138 L 390,138 L 390,192 L 363,192 L 363,312
       L 425,312 L 425,358 L 135,358 L 135,312 L 197,312
       L 197,192 L 170,192 L 87,165 Z"
    fill="#F59E0B"
    opacity="0.25"
    filter="url(#glow)"
  />

  <!-- Anvil silhouette -->
  <path
    d="M 170,138 L 390,138 L 390,192 L 363,192 L 363,312
       L 425,312 L 425,358 L 135,358 L 135,312 L 197,312
       L 197,192 L 170,192 L 87,165 Z"
    fill="url(#anvil)"
  />

  <!-- Bright working-face highlight (top edge of face) -->
  <rect x="170" y="138" width="220" height="5" fill="#FEF3C7" rx="2" opacity="0.55"/>

  <!-- Subtle inner top-face sheen -->
  <rect x="170" y="143" width="220" height="22" fill="#FCD34D" opacity="0.12" rx="1"/>
</svg>
