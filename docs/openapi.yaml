      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Program'
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Program'
        "400":
          $ref: '#/components/responses/ValidationError'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "409":
          description: ID already exists.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorIdConflict'

  /programs/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      summary: Get program by ID
      operationId: getProgram
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Program'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "404":
          $ref: '#/components/responses/NotFound'
    patch:
      summary: Replace program (full-document update — re-inserts all days)
      operationId: updateProgram
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Program'
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Program'
        "400":
          $ref: '#/components/responses/ValidationError'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "404":
          $ref: '#/components/responses/NotFound'
    delete:
      summary: Delete program
      operationId: deleteProgram
      responses:
        "204":
          description: Deleted.
        "401":
          $ref: '#/components/responses/Unauthorized'

  # ── Program Runs ──────────────────────────────────────────────────────────────

  /program-runs:
    get:
      summary: List all program runs (with nested day states)
      operationId: listProgramRuns
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [runs]
                properties:
                  runs:
                    type: array
                    items:
                      $ref: '#/components/schemas/ProgramRun'
        "401":
          $ref: '#/components/responses/Unauthorized'
    post:
      summary: Start a program run
      operationId: createProgramRun
      description: |
        Creates a run with `status: active`. Only one run may be active globally —
        returns `409 active_run_exists` if another already exists.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id, programId, startedAt]
              properties:
                id:
                  type: string
                  format: uuid
                programId:
                  type: string
                  format: uuid
                startedAt:
                  type: integer
                  description: Unix timestamp (ms).
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProgramRun'
        "400":
          $ref: '#/components/responses/ValidationError'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "409":
          description: ID already exists or another run is active.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ErrorIdConflict'
                  - $ref: '#/components/schemas/ErrorActiveRunExists'

  /program-runs/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      summary: Get program run by ID
      operationId: getProgramRun
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProgramRun'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "404":
          $ref: '#/components/responses/NotFound'
    patch:
      summary: Replace program run (full-document update — re-inserts all day states)
      operationId: updateProgramRun
      description: |
        Validates that no `dayState.weekIndex` exceeds the program's `durationWeeks`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProgramRun'
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProgramRun'
        "400":
          $ref: '#/components/responses/ValidationError'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "404":
          $ref: '#/components/responses/NotFound'
    delete:
      summary: Delete program run
      operationId: deleteProgramRun
      responses:
        "204":
          description: Deleted.
        "401":
          $ref: '#/components/responses/Unauthorized'

  # ── Goals ─────────────────────────────────────────────────────────────────────

  /goals:
    get:
      summary: List all goals
      operationId: listGoals
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [goals]
                properties:
                  goals:
                    type: array
                    items:
                      $ref: '#/components/schemas/Goal'
        "401":
          $ref: '#/components/responses/Unauthorized'
    post:
      summary: Create goal
      operationId: createGoal
      description: |
        The full goal record (including `id` and timestamps) is supplied by the
        client. Category-specific field requirements are enforced — see the Goal
        schema description for details.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Goal'
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Goal'
        "400":
          $ref: '#/components/responses/ValidationError'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "409":
          description: ID already exists.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorIdConflict'

  /goals/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      summary: Get goal by ID
      operationId: getGoal
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Goal'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "404":
          $ref: '#/components/responses/NotFound'
    patch:
      summary: Partially update goal
      operationId: updateGoal
      description: |
        Merges the incoming fields over the stored record then re-validates the
        merged result against the full Goal schema. Returns `409 stale_update`
        if `updatedAt` is older than the server's current value.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/Goal'
              description: All fields optional except `id`.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Goal'
        "400":
          $ref: '#/components/responses/ValidationError'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "404":
          $ref: '#/components/responses/NotFound'
        "409":
          description: Stale update rejected.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorStaleUpdate'
    delete:
      summary: Delete goal
      operationId: deleteGoal
      responses:
        "204":
          description: Deleted.
        "401":
          $ref: '#/components/responses/Unauthorized'
        "404":
          $ref: '#/components/responses/NotFound'

  # ── Settings ──────────────────────────────────────────────────────────────────

  /settings:
    get:
      summary: Get settings (auto-seeds defaults on first call)
      operationId: getSettings
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Settings'
        "401":
          $ref: '#/components/responses/Unauthorized'
    patch:
      summary: Partially update settings
      operationId: updateSettings
      description: |
        Merges incoming fields over existing settings. Returns `409 stale_update`
        if `updatedAt` is older than the server's current value.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                weightUnit:
                  type: string
                  enum: [kg, lb]
                distanceUnit:
                  type: string
                  enum: [m, km, mi]
                heightUnit:
                  type: string
                  enum: [cm, ft]
                timezone:
                  type: string
                weekStartsOn:
                  type: string
                  enum: [mon, sun]
                showRpe:
                  type: boolean
                showCardio:
                  type: boolean
                theme:
                  type: string
                  enum: [system, light, dark]
                updatedAt:
                  type: integer
                  description: Unix timestamp (ms). Used for stale-update detection.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Settings'
        "400":
          $ref: '#/components/responses/ValidationError'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "404":
          description: Settings not yet initialized (call GET /settings first).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorNotFound'
        "409":
          description: Stale update rejected.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorStaleUpdate'

  # ── Export ────────────────────────────────────────────────────────────────────

  /export:
    get:
      summary: Full data export
      operationId: exportData
      description: |
        Returns a complete snapshot of all data in a versioned JSON envelope,
        read inside a single SQLite transaction for consistency. The response
        sets `Content-Disposition: attachment` with a dated filename.

        Invalid rows are omitted with a warning in `_warnings` rather than
        aborting the export.
      responses:
        "200":
          description: Export envelope as a downloadable JSON file.
          headers:
            Content-Disposition:
              schema:
                type: string
                example: 'attachment; filename="forge-export-2026-05-27.json"'
          content:
            application/json:
              schema:
                type: object
                required: [schemaVersion, exportedAt, source, appVersion, entities]
                properties:
                  schemaVersion:
                    type: integer
                    enum: [1]
                  exportedAt:
                    type: integer
                    description: Unix timestamp (ms).
                  source:
                    type: string
                    enum: [server]
                  appVersion:
                    type: string
                  entities:
                    type: object
                    properties:
                      exercises:
                        type: array
                        items:
                          $ref: '#/components/schemas/Exercise'
                      equipment:
                        type: array
                        items:
                          $ref: '#/components/schemas/Equipment'
                      routines:
                        type: array
                        items:
                          $ref: '#/components/schemas/Routine'
                      programs:
                        type: array
                        items:
                          $ref: '#/components/schemas/Program'
                      programRuns:
