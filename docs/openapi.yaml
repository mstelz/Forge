          description: Deleted.
        "401":
          $ref: '#/components/responses/Unauthorized'

  # ── Sessions ──────────────────────────────────────────────────────────────────

  /sessions:
    get:
      summary: List all sessions (newest first)
      operationId: listSessions
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [sessions]
                properties:
                  sessions:
                    type: array
                    items:
                      $ref: '#/components/schemas/Session'
        "401":
          $ref: '#/components/responses/Unauthorized'
    post:
      summary: Start a new session
      operationId: createSession
      description: |
        Creates a session with `status: in_progress`. Only one session may be
        in progress at a time — returns `409 in_progress_exists` if another
        already exists.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id, sourceType, templateSnapshot, liveStructure, startedAt, createdAt, updatedAt]
              properties:
                id:
                  type: string
                  format: uuid
                sourceType:
                  type: string
                  enum: [routine, program_day, freeform]
                sourceRoutineId:
                  type: string
                  nullable: true
                sourceProgramId:
                  type: string
                  nullable: true
                sourceProgramWeekIndex:
                  type: integer
                  nullable: true
                sourceProgramDayIndex:
                  type: integer
                  nullable: true
                templateSnapshot:
                  type: string
                  nullable: true
                liveStructure:
                  type: string
                title:
                  type: string
                  nullable: true
                notes:
                  type: string
                  nullable: true
                startedAt:
                  type: integer
                  description: Unix timestamp (ms).
                createdAt:
                  type: integer
                  description: Unix timestamp (ms).
                updatedAt:
                  type: integer
                  description: Unix timestamp (ms).
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'
        "400":
          $ref: '#/components/responses/ValidationError'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "409":
          description: ID already exists or another session is in progress.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ErrorIdConflict'
                  - $ref: '#/components/schemas/ErrorInProgressExists'

  /sessions/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      summary: Get session by ID
      operationId: getSession
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "404":
          $ref: '#/components/responses/NotFound'
    patch:
      summary: Update session (full-document replace)
      operationId: updateSession
      description: Returns `409 finished` if the session is already finished.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Session'
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'
        "400":
          $ref: '#/components/responses/ValidationError'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "404":
          $ref: '#/components/responses/NotFound'
        "409":
          description: Session is already finished.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorFinished'
    delete:
      summary: Delete session (cascades to logs)
      operationId: deleteSession
      responses:
        "204":
          description: Deleted.
        "401":
          $ref: '#/components/responses/Unauthorized'

  /sessions/{id}/finish:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    post:
      summary: Finish a session
      operationId: finishSession
      description: Sets `status: finished` and records `endedAt`. Returns `409 finished` if already finished.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [endedAt]
              properties:
                endedAt:
                  type: integer
                  description: Unix timestamp (ms).
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'
        "400":
          $ref: '#/components/responses/ValidationError'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "404":
          $ref: '#/components/responses/NotFound'
        "409":
          description: Session is already finished.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorFinished'

  /sessions/{id}/logs:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      summary: List set logs for a session (ordered by loggedAt asc)
      operationId: listSessionLogs
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [logs]
                properties:
                  logs:
                    type: array
                    items:
                      $ref: '#/components/schemas/SessionSetLog'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "404":
          $ref: '#/components/responses/NotFound'
    post:
      summary: Add a set log to a session
      operationId: createSessionLog
      description: Returns `409 finished` if the parent session is finished.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SessionSetLog'
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionSetLog'
        "400":
          $ref: '#/components/responses/ValidationError'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "404":
          $ref: '#/components/responses/NotFound'
        "409":
          description: ID conflict or session already finished.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ErrorIdConflict'
                  - $ref: '#/components/schemas/ErrorFinished'

  /sessions/{id}/logs/{logId}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: logId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    patch:
      summary: Update a set log (full-document replace)
      operationId: updateSessionLog
      description: Returns `409 finished` if the parent session is finished.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SessionSetLog'
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionSetLog'
        "400":
          $ref: '#/components/responses/ValidationError'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "404":
          $ref: '#/components/responses/NotFound'
        "409":
          description: Session is already finished.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorFinished'
    delete:
      summary: Delete a set log
      operationId: deleteSessionLog
      description: Returns `409 finished` if the parent session is finished.
      responses:
        "204":
          description: Deleted.
        "401":
          $ref: '#/components/responses/Unauthorized'
        "404":
          $ref: '#/components/responses/NotFound'
        "409":
          description: Session is already finished.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorFinished'

  # ── History ───────────────────────────────────────────────────────────────────

  /history/sessions:
    get:
      summary: Paginated list of finished session summaries
      operationId: getHistorySessions
      parameters:
        - name: range
          in: query
          schema:
            type: string
            enum: [all, week, month, year, custom]
            default: all
        - name: from
          in: query
          description: Start of custom range (Unix ms). Used when `range=custom`.
          schema:
            type: integer
        - name: to
          in: query
          description: End of custom range (Unix ms). Used when `range=custom`.
          schema:
            type: integer
        - name: routine
          in: query
          description: Filter to sessions sourced from this routine ID.
          schema:
            type: string
            format: uuid
        - name: program
          in: query
          description: Filter to sessions sourced from this program ID.
          schema:
            type: string
            format: uuid
        - name: exercise
          in: query
          description: Filter to sessions that include at least one logged set for this exercise ID.
          schema:
            type: string
            format: uuid
        - name: q
          in: query
          description: Free-text search against session title and notes.
          schema:
            type: string
        - name: cursor
          in: query
          description: Opaque cursor from a previous response's `nextCursor`.
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [sessions, nextCursor]
                properties:
                  sessions:
                    type: array
                    items:
                      $ref: '#/components/schemas/SessionSummary'
                  nextCursor:
                    type: string
                    nullable: true
                    description: Pass as `cursor` in the next request to fetch the next page. `null` when there are no more results.
        "400":
          $ref: '#/components/responses/ValidationError'
        "401":
          $ref: '#/components/responses/Unauthorized'

  /history/summary:
    get:
      summary: Aggregate stats for finished sessions matching a filter
      operationId: getHistorySummary
      parameters:
        - name: range
          in: query
          schema:
            type: string
            enum: [all, week, month, year, custom]
            default: all
        - name: from
          in: query
          schema:
            type: integer
        - name: to
          in: query
          schema:
            type: integer
        - name: routine
          in: query
          schema:
            type: string
            format: uuid
        - name: program
          in: query
          schema:
            type: string
            format: uuid
        - name: exercise
          in: query
          schema:
            type: string
            format: uuid
        - name: q
          in: query
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HistorySummary'
        "400":
          $ref: '#/components/responses/ValidationError'
        "401":
          $ref: '#/components/responses/Unauthorized'

  # ── Programs ──────────────────────────────────────────────────────────────────

  /programs:
    get:
      summary: List all programs (with nested days)
      operationId: listPrograms
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
