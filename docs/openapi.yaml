              schema:
                $ref: '#/components/schemas/Routine'
        "400":
          $ref: '#/components/responses/ValidationError'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "404":
          $ref: '#/components/responses/NotFound'
    delete:
      summary: Delete routine
      operationId: deleteRoutine
      responses:
